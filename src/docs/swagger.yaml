openapi: 3.0.0
info:
  title: School Management System API
  version: 1.0.0
  description: API documentation for the School Management System
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
paths:
  # --- Auth ---
  /api/auth/createUser:
    post:
      tags: [Auth]
      summary: Create a new user (Superadmin only)
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email: { type: string }
                firstName: { type: string }
                lastName: { type: string }
                role: { type: string, enum: [SCHOOL_ADMIN] }
                schoolId: { type: string }
      responses:
        '200': { description: User created successfully. Password is (firstName+lastName).toLowerCase() }

  /api/auth/login:
    post:
      tags: [Auth]
      summary: Login to the system
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email: { type: string }
                password: { type: string }
      responses:
        '200': { description: Login successful }

  # --- School ---
  /api/school/createSchool:
    post:
      tags: [School]
      summary: Create a new school (Superadmin only)
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                address: { type: string }
                phone: { type: string }
                email: { type: string }
      responses:
        '200': { description: School created successfully }

  /api/school/getSchools:
    get:
      tags: [School]
      summary: Get all schools
      security: [{ bearerAuth: [] }]
      responses:
        '200': { description: List of schools }

  /api/school/getSchool:
    get:
      tags: [School]
      summary: Get a single school by ID
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: query
          required: true
          schema: { type: string }
      responses:
        '200': { description: School details }

  /api/school/updateSchool:
    put:
      tags: [School]
      summary: Update a school
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                id: { type: string }
                name: { type: string }
                address: { type: string }
                phone: { type: string }
                email: { type: string }
      responses:
        '200': { description: School updated successfully }

  /api/school/deleteSchool:
    delete:
      tags: [School]
      summary: Delete a school
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: query
          required: true
          schema: { type: string }
      responses:
        '200': { description: School deleted successfully }

  # --- Classroom ---
  /api/classroom/createClassroom:
    post:
      tags: [Classroom]
      summary: Create a new classroom
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                capacity: { type: number }
                resources: { type: array, items: { type: string } }
      responses:
        '200': { description: Classroom created successfully }

  /api/classroom/getClassrooms:
    get:
      tags: [Classroom]
      summary: Get all classrooms for the admin's school
      security: [{ bearerAuth: [] }]
      responses:
        '200': { description: List of classrooms }

  /api/classroom/updateClassroom:
    put:
      tags: [Classroom]
      summary: Update a classroom
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                id: { type: string }
                name: { type: string }
                capacity: { type: number }
                resources: { type: array, items: { type: string } }
      responses:
        '200': { description: Classroom updated successfully }

  /api/classroom/deleteClassroom:
    delete:
      tags: [Classroom]
      summary: Delete a classroom
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: query
          required: true
          schema: { type: string }
      responses:
        '200': { description: Classroom deleted successfully }

  # --- Student ---
  /api/student/enrollStudent:
    post:
      tags: [Student]
      summary: Enroll a new student and create their user account
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                firstName: { type: string }
                lastName: { type: string }
                email: { type: string }
                classroomId: { type: string }
      responses:
        '200': { description: Student enrolled successfully. Password is (firstName+lastName).toLowerCase() }

  /api/student/getStudents:
    get:
      tags: [Student]
      summary: Get all students for the admin's school
      security: [{ bearerAuth: [] }]
      responses:
        '200': { description: List of students }

  /api/student/transferStudent:
    post:
      tags: [Student]
      summary: Transfer a student to another room or school
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                studentId: { type: string }
                newSchoolId: { type: string }
                newClassroomId: { type: string }
      responses:
        '200': { description: Student transferred successfully }

  /api/student/updateStudentProfile:
    put:
      tags: [Student]
      summary: Update a student's profile information
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                id: { type: string }
                firstName: { type: string }
                lastName: { type: string }
                email: { type: string }
      responses:
        '200': { description: Student profile updated }
